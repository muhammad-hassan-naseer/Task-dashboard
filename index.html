<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Dashboard</title>

    <!-- Google Font: DM Sans (matches the app's font stack) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- React 18 + ReactDOM (UMD, development build — swap to .production.min.js for prod) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel standalone: transpiles JSX + modern JS in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* ── Reset & base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
        background: #0e1118;   /* dark base — the app controls its own bg */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root { min-height: 100vh; }

      /* ── Loading placeholder (shown before React mounts) ── */
      #loading-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0e1118; gap: 16px;
        font-family: 'DM Sans', sans-serif;
        transition: opacity 0.3s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }

      .spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid #2a2f40;
        border-top-color: #6366f1;
        animation: spin 0.8s linear infinite;
      }
      .loading-label {
        font-size: 13px; color: #4b5563; letter-spacing: 0.02em;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Scrollbar (dark theme) ── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2f40; border-radius: 3px; }
    </style>
  </head>

  <body>
    <!-- Loading screen (dismissed once React renders) -->
    <div id="loading-screen">
      <div class="spinner"></div>
      <div class="loading-label">Loading Task Dashboard…</div>
    </div>

    <!-- React mount point -->
    <div id="root"></div>

    <!--
      ┌─────────────────────────────────────────────────────────┐
      │  HOW THIS WORKS                                         │
      │                                                         │
      │  type="text/babel"  → Babel standalone intercepts the   │
      │  script tag and transpiles JSX + ES2022 before running. │
      │                                                         │
      │  data-type="module" → enables ES module semantics       │
      │  (import/export) inside the Babel transform so the      │
      │  TaskDashboard.jsx "export default App" is handled.     │
      │                                                         │
      │  The file is loaded relative to index.html — keep both  │
      │  files in the same folder and open via a local server   │
      │  (e.g. VS Code Live Server, or: npx serve .)            │
      └─────────────────────────────────────────────────────────┘
    -->
    <script type="text/babel" data-type="module">
      // Re-expose React globals so the JSX in TaskDashboard.jsx
      // can resolve named imports from the "react" specifier.
      // Babel transforms `import { useState } from "react"` into
      // a lookup on this synthetic module map.
      import React, {
        useState, useEffect, useReducer,
        useCallback, useMemo, useRef,
        useContext, createContext
      } from "react";
      import ReactDOM from "react-dom/client";

      // ── Load the app component ──
      import App from "./TaskDashboard.jsx";

      // ── Mount ──
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);

      // ── Dismiss loading screen once React has painted ──
      requestAnimationFrame(() => {
        const screen = document.getElementById("loading-screen");
        if (screen) {
          screen.classList.add("hidden");
          setTimeout(() => screen.remove(), 350);
        }
      });
    </script>
  </body>
</html>
